name: NyayaVanni Super Bot

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  automation:
    runs-on: ubuntu-latest
    steps:
      - name: Auto Label and Assign
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const eventName = context.eventName;

            // ==========================================
            // FEATURE 1: AUTO-ASSIGNER (For Issue Comments)
            // ==========================================
            if (eventName === 'issue_comment') {
              const comment = context.payload.comment.body.toLowerCase();
              const issue = context.payload.issue;
              const commenter = context.payload.comment.user.login;
              
              const askingForAssignment = comment.includes('assign') || comment.includes('work on this') || comment.includes('take this');
              
              if (askingForAssignment && (!issue.assignees || issue.assignees.length === 0)) {
                await github.rest.issues.addAssignees({ owner, repo, issue_number: issue.number, assignees: [commenter] });
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issue.number,
                  body: `Hi @${commenter}, welcome to NyayaVanni! 🎉 I have assigned this issue to you since you claimed it first. Happy coding! 🚀`
                });
              }
              return; // Stop here if it was just a comment
            }

            // ==========================================
            // FEATURE 2: AUTO-LABELER (For Issues & PRs)
            // ==========================================
            const isPR = eventName === 'pull_request_target';
            const number = isPR ? context.payload.pull_request.number : context.payload.issue.number;
            const title = isPR ? context.payload.pull_request.title : context.payload.issue.title;
            const body = (isPR ? context.payload.pull_request.body : context.payload.issue.body) || '';

            const text = `${title} ${body}`.toLowerCase();
            const labelsToAdd = new Set();

            // Always add the GSSoC tag to new issues
            if (!isPR) {
              labelsToAdd.add('gssoc26');
            }

            // Keyword Map -> Labels
            const keywordMap = [
              [/\bbug\b|\bfix(es|ed)?\b|\bbroken\b|\bcrash\b|\berror\b/, 'bug'],
              [/\bfeature\b|\benhancement\b/, 'enhancement'],
              [/\bdocs?\b|\bdocumentation\b|\breadme\b/, 'documentation'],
              [/\bdesign\b|\bui\b|\bux\b|\bstyle\b|\bcsss?\b|\blayout\b/, 'design'],
              [/\bauth\b|\blogin\b|\bsecurity\b/, 'security']
            ];

            for (const [pattern, label] of keywordMap) {
              if (pattern.test(text)) labelsToAdd.add(label);
            }

            // Line-count -> Level label (PRs only)
            if (isPR) {
              let totalLines = 0;
              let page = 1;
              while (true) {
                const { data: files } = await github.rest.pulls.listFiles({
                  owner, repo, pull_number: number, per_page: 100, page
                });
                totalLines += files.reduce((sum, f) => sum + f.additions + f.deletions, 0);
                if (files.length < 100) break;
                page++;
              }

              if (totalLines < 50) labelsToAdd.add('level:beginner');
              else if (totalLines <= 200) labelsToAdd.add('level:intermediate');
              else labelsToAdd.add('level:advanced');
            }

            if (labelsToAdd.size > 0) {
              try {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: number, labels: Array.from(labelsToAdd)
                });
              } catch (e) {
                console.log(`Failed to add labels: ${e.message}`);
              }
            }
